<!DOCTYPE html>
<html>
<head>
    <title>Doctor Patient Call</title>
</head>
<body>

<h2>Doctor-Patient Call</h2>

<video id="localVideo" autoplay muted width="300"></video>
<video id="remoteVideo" autoplay width="300"></video>

<br><br>

<input id="messageInput" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>

<ul id="chatBox"></ul>

<br>
<button onclick="startCall()">Start Call</button>

<script>
let localStream;
let peer;
let socket;

const room = "appointment123";

socket = new WebSocket(`ws://127.0.0.1:8000/ws/call/${room}/`);

const config = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]  
};

socket.onmessage = async (e) => {
    const data = JSON.parse(e.data);

    if (data.offer) {
        await peer.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peer.createAnswer();
        await peer.setLocalDescription(answer);
        socket.send(JSON.stringify({ answer }));
    }

    if (data.answer) {
        await peer.setRemoteDescription(new RTCSessionDescription(data.answer));
    }

    if (data.candidate) {
        await peer.addIceCandidate(new RTCIceCandidate(data.candidate));
    }

    if (data.chat) {
        addMessage("Remote: " + data.chat);
    }
};

async function startCall() {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });

    document.getElementById("localVideo").srcObject = localStream;

    peer = new RTCPeerConnection(config);

    localStream.getTracks().forEach(track => peer.addTrack(track, localStream));

    peer.ontrack = e => {
        document.getElementById("remoteVideo").srcObject = e.streams[0];
    };

    peer.onicecandidate = e => {
        if (e.candidate) {
            socket.send(JSON.stringify({ candidate: e.candidate }));
        }
    };

    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);

    socket.send(JSON.stringify({ offer }));
}

function sendMessage() {
    const msg = document.getElementById("messageInput").value;

    socket.send(JSON.stringify({ chat: msg }));
    addMessage("Me: " + msg);
}

function addMessage(msg) {
    const li = document.createElement("li");
    li.innerText = msg;
    document.getElementById("chatBox").appendChild(li);
}
</script>

</body>
</html>
