<!DOCTYPE html>
<html>
<head>
    <title>Doctor Patient Chat</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        #chatBox {
            border: 1px solid black;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
        }

        .msg {
            margin: 5px 0;
        }

        .me {
            text-align: right;
            color: blue;
        }

        .other {
            text-align: left;
        }

        .tick {
            font-size: 12px;
            margin-left: 5px;
            color: gray;
        }

        #connectBtn {
            padding: 6px 12px;
            border: none;
            cursor: pointer;
        }

        video {
            border: 1px solid black;
        }
    </style>
</head>

<body>

<h2>Doctor-Patient Chat</h2>

<input type="number" id="userId" placeholder="Your User ID" />
<input type="number" id="appointmentId" placeholder="Appointment ID" />
<button id="connectBtn" onclick="connectWS()">Connect</button>

<hr>

<div id="chatBox"></div>

<input type="text" id="messageInput" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>

<hr>

<h3>Video Call</h3>

<video id="localVideo" autoplay muted width="200"></video>
<video id="remoteVideo" autoplay width="200"></video>

<br><br>
<button onclick="startCall()">Start Call</button>
<button onclick="startAudioCall()">Audio Call</button>

<script>
let socket;
let userId;
let appointmentId;

let localStream;
let peerConnection;
const renderedMessageIds = new Set();

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject"
        }
    ]
};

function connectWS() {
    userId = parseInt(document.getElementById("userId").value, 10);
    appointmentId = document.getElementById("appointmentId").value;

    const btn = document.getElementById("connectBtn");
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";

    if (!userId || !appointmentId) {
        alert("Please enter user ID and appointment ID");
        return;
    }

    socket = new WebSocket(`${protocol}://${window.location.host}/ws/chat/${appointmentId}/`);

    btn.innerText = "Connecting...";
    btn.style.backgroundColor = "orange";

    socket.onopen = () => {
        btn.innerText = "Connected";
        btn.style.backgroundColor = "green";
        btn.style.color = "white";
    };

    socket.onerror = () => {
        btn.innerText = "Error";
        btn.style.backgroundColor = "red";
        btn.style.color = "white";
    };

    socket.onclose = () => {
        btn.innerText = "Connect";
        btn.style.backgroundColor = "";
        btn.style.color = "";
    };

    socket.onmessage = async (event) => {
        const data = JSON.parse(event.data);

        if (data.message && data.sender) {
            const isMe = Number(data.sender_id) === userId;
            addMessage(data.message, data.message_id, isMe, data.sender);

            if (!isMe && data.message_id) {
                socket.send(JSON.stringify({
                    type: "seen",
                    message_id: data.message_id
                }));
            }
        }

        if (data.type === "seen_update") {
            const msg = document.getElementById(`msg-${data.message_id}`);
            if (msg) {
                const tick = msg.querySelector(".tick");
                if (tick) {
                    tick.innerText = "seen";
                }
            }
        }

        if (data.type === "offer") {
            await handleOffer(data.offer);
        }

        if (data.type === "answer" && peerConnection) {
            await peerConnection.setRemoteDescription(data.answer);
        }

        if (data.type === "candidate" && peerConnection) {
            await peerConnection.addIceCandidate(data.candidate);
        }
    };
}

function addMessage(message, id, isMe, senderName) {
    const chatBox = document.getElementById("chatBox");

    if (id && renderedMessageIds.has(id)) {
        return;
    }

    const className = isMe ? "me" : "other";
    const tick = isMe ? "sent" : "";
    const label = isMe ? "You" : (senderName || "User");

    const html = `
        <div id="msg-${id}" class="msg ${className}">
            <b>${label}:</b> ${message}
            <span class="tick">${tick}</span>
        </div>
    `;

    chatBox.innerHTML += html;
    chatBox.scrollTop = chatBox.scrollHeight;

    if (id) {
        renderedMessageIds.add(id);
    }
}

function sendMessage() {
    const input = document.getElementById("messageInput");
    const msg = input.value.trim();

    if (!msg) {
        return;
    }

    if (!socket || socket.readyState !== WebSocket.OPEN) {
        alert("Please connect first");
        return;
    }

    socket.send(JSON.stringify({
        type: "message",
        message: msg,
        sender_id: userId
    }));

    input.value = "";
}

async function startCall() {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
        alert("Please connect first");
        return;
    }

    await initMedia();
    createPeerConnection();

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

    socket.send(JSON.stringify({
        type: "offer",
        offer: offer
    }));
}

async function startAudioCall() {
    try {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
            alert("Please connect first");
            return;
        }

        localStream = await navigator.mediaDevices.getUserMedia({
            video: false,
            audio: true
        });

        document.getElementById("localVideo").srcObject = null;
        createPeerConnection();

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        socket.send(JSON.stringify({
            type: "offer",
            offer: offer
        }));
    } catch (err) {
        alert("Audio error: " + err.message);
    }
}

async function initMedia() {
    localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    });

    document.getElementById("localVideo").srcObject = localStream;
}

function createPeerConnection() {
    peerConnection = new RTCPeerConnection(config);

    peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
            socket.send(JSON.stringify({
                type: "candidate",
                candidate: event.candidate
            }));
        }
    };

    peerConnection.ontrack = (event) => {
        const remoteVideo = document.getElementById("remoteVideo");
        remoteVideo.srcObject = event.streams[0];

        remoteVideo.play().catch((error) => {
            console.log("Autoplay blocked:", error);
        });
    };

    if (localStream) {
        localStream.getTracks().forEach((track) => {
            peerConnection.addTrack(track, localStream);
        });
    }
}

async function handleOffer(offer) {
    const hasVideo = offer.sdp.includes("m=video");

    localStream = await navigator.mediaDevices.getUserMedia({
        video: hasVideo,
        audio: true
    });

    document.getElementById("localVideo").srcObject = hasVideo ? localStream : null;

    createPeerConnection();

    await peerConnection.setRemoteDescription(offer);

    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);

    socket.send(JSON.stringify({
        type: "answer",
        answer: answer
    }));
}
</script>

</body>
</html>
